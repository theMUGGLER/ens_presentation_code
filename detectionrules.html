const RULES=[
{cat:"Lexical / name confusion",id:"L1",prio:"P1",title:"Edit-distance similarity",desc:"Flag ENS names with Levenshtein distance ≤1–2 or Jaro-Winkler similarity ≥0.90 against an allowlisted brand/protocol list.",where:["Python","Offline batch","API pipeline"],logic:`from jellyfish import jaro_winkler_similarity, levenshtein_distance
BRANDS = ["uniswap","metamask","opensea","aave","curve","ens","coinbase"]
def check(label):
    for brand in BRANDS:
        if levenshtein_distance(label,brand) <= 2:
            return True, f"edit-dist match: {brand}"
        if jaro_winkler_similarity(label,brand) >= 0.90:
            return True, f"jaro-winkler match: {brand}"
    return False, None`},
{cat:"Lexical / name confusion",id:"L2",prio:"P1",title:"Homoglyph / confusable characters",desc:"Detect Unicode confusables (UTS #39) and mixed-script labels whose skeleton matches a protected brand.",where:["Python","confusable_homoglyphs lib"],logic:`from confusable_homoglyphs import confusables
def skeleton(s):
    return confusables.is_confusable(s, preferred_aliases=['latin'])
# Flag if skeleton(label) matches any brand skeleton`},
{cat:"Lexical / name confusion",id:"L3",prio:"P1",title:"Brand keyword misuse",desc:"Regex match on ENS label against known brand/protocol keywords.",where:["Regex","Python","Dune SQL","Indexer"],logic:`import re
BRAND_RE = re.compile(
  r'(?i)(uniswap|metamask|opensea|coinbase|aave|curve|blur|ens|'
  r'ledger|trezor|binance|kraken|walletconnect|zksync|arbitrum|optimism)'
)
def check(label): return bool(BRAND_RE.search(label))`},
{cat:"Lexical / name confusion",id:"L4",prio:"P2",title:"Phishing lure keywords",desc:"Regex match on ENS label against common phishing/social-engineering lure words.",where:["Regex","Python","Dune SQL"],logic:`import re
LURE_RE = re.compile(
  r'(?i)(airdrop|claim|verify|support|refund|bonus|reward|login|'
  r'secure|update|connect|restore|unlock|migration|snapshot|whitelist|mint)'
)`},
{cat:"Lexical / name confusion",id:"L5",prio:"P2",title:"Brand + lure combination",desc:"Flag only when both a brand keyword and a lure keyword co-occur in the same ENS label.",where:["Python","Dune SQL"],logic:`# Combine L3 + L4 patterns — flag only on both matching
def check(label):
    return bool(BRAND_RE.search(label)) and bool(LURE_RE.search(label))
# e.g. metamask-support.eth, uniswap-claim.eth`},
{cat:"Lexical / name confusion",id:"L6",prio:"P2",title:"Suspicious separators / lookalike formatting",desc:"Detect repeated separators, double dots, or support/claim compound substrings.",where:["Regex","Python"],logic:`import re
SEP_RE = re.compile(
  r'(?i)(-|_|\\d){2,}|\\.{2,}|(support|help|claim|verify)[-_]?(wallet|airdrop|token|nft)'
)`},

{cat:"Registration & expiry history",id:"R1",prio:"P1",title:"Dropcatching / rapid re-registration",desc:"Flag NameRegistered events that occur soon after prior expiry and with a different registrant.",where:["Dune Analytics","SQL","Python on ENS subgraph"],logic:`-- Dune SQL (ENS ens.events_view)
SELECT
  name, new_owner, old_expiry, new_registered_at,
  EXTRACT(epoch FROM (new_registered_at - old_expiry)) AS gap_secs
FROM ens_name_history
WHERE new_owner <> old_owner
  AND gap_secs < 86400  -- re-registered within 24h of expiry`},
{cat:"Registration & expiry history",id:"R2",prio:"P1",title:"Post-expiry residual trust payments",desc:"After re-registration by new owner, flag inbound ETH/ERC20 from wallets that previously interacted with the old resolved address.",where:["Dune Analytics","SQL","Python + on-chain data"],logic:`-- Flag transfers within 7-30 days of re-registration
-- from addresses that historically sent to old_resolved_addr
SELECT t.* FROM transfers t
JOIN ens_reregistrations r
  ON t.to_addr = r.new_resolved_addr
  AND t.from_addr IN (
    SELECT DISTINCT from_addr FROM transfers
    WHERE to_addr = r.old_resolved_addr
  )
  AND t.block_time BETWEEN r.registered_at
    AND r.registered_at + INTERVAL '30 days'`},
{cat:"Registration & expiry history",id:"R3",prio:"P1",title:"Bulk registration by same wallet",desc:"Flag any owner that registers ≥ N ENS names within 24 hours, especially with similar lexical patterns.",where:["Dune Analytics","SQL"],logic:`SELECT registrant, COUNT(*) as cnt
FROM ens.events_NameRegistered
WHERE evt_block_time >= NOW() - INTERVAL '24 hours'
GROUP BY registrant
HAVING COUNT(*) >= 5  -- tune N
ORDER BY cnt DESC`},
{cat:"Registration & expiry history",id:"R4",prio:"P2",title:"Newly registered name used immediately",desc:"Flag ENS names where addr/text/contenthash records are set within minutes/hours of registration and then receive inbound transfers.",where:["Dune Analytics","SQL","ENS subgraph"],logic:`SELECT name
FROM ens_events
WHERE event IN ('addr_set','text_changed','contenthash_changed')
  AND EXTRACT(epoch FROM (event_time - registered_at)) < 3600
  -- then join on transfer events from same name's resolved address`},
{cat:"Registration & expiry history",id:"R5",prio:"P2",title:"Portfolio squatting pattern",desc:"Flag registrants whose portfolio contains multiple brand-similar names by edit-distance or keyword match.",where:["Python","ENS subgraph","Batch job"],logic:`# For each registrant, fetch all their ENS names
# Run L1/L3 checks across the portfolio
def portfolio_risk(names):
    return sum(1 for n in names if brand_match(n) or edit_dist_match(n))`},
{cat:"Registration & expiry history",id:"R6",prio:"P3",title:"Short-lived registration pattern",desc:"Flag names registered/renewed for minimum period with suspicious records set shortly after creation.",where:["Dune Analytics","SQL"],logic:`SELECT name, registered_at, expires_at,
  DATEDIFF('day', registered_at, expires_at) AS duration_days
FROM ens_registrations
WHERE duration_days <= 28
  AND has_addr_record = TRUE`},

{cat:"Resolver changes",id:"RS1",prio:"P1",title:"Resolver changed recently before risky activity",desc:"Flag if resolver changes and within 24–72 h addr, text, or contenthash changes also occur.",where:["Dune Analytics","SQL","ENS subgraph"],logic:`SELECT name
FROM ens_events e1
JOIN ens_events e2 ON e1.name = e2.name
WHERE e1.event = 'NewResolver'
  AND e2.event IN ('AddrChanged','TextChanged','ContenthashChanged')
  AND e2.block_time BETWEEN e1.block_time
    AND e1.block_time + INTERVAL '72 hours'`},
{cat:"Resolver changes",id:"RS2",prio:"P1",title:"Switch to unknown/custom resolver",desc:"Flag resolver addresses not in the ENS public resolver allowlist or previously seen resolver family.",where:["Dune SQL","Python","Allowlist DB"],logic:`KNOWN_RESOLVERS = {
  "0x4976fb03C32e5B8cfe2b6cCB31c09Ba78EBaBa41",  # ENS Public Resolver v2
  "0xA2C122BE93b0074270ebeE7f6b7292C7deB45047",  # Public Resolver v1
}
def check(resolver_addr):
    return resolver_addr.lower() not in {r.lower() for r in KNOWN_RESOLVERS}`},
{cat:"Resolver changes",id:"RS3",prio:"P1",title:"Resolver bytecode novelty",desc:"Fetch resolver bytecode hash; flag if hash is unseen or not matching any known resolver implementation.",where:["Web3.py","Etherscan API","Bytecode hash DB"],logic:`from web3 import Web3
w3 = Web3(Web3.HTTPProvider(RPC_URL))
def check(resolver_addr):
    code = w3.eth.get_code(resolver_addr)
    code_hash = Web3.keccak(code).hex()
    return code_hash not in KNOWN_BYTECODE_HASHES`},
{cat:"Resolver changes",id:"RS4",prio:"P2",title:"Resolver churn",desc:"Flag ENS names that change resolver ≥2–3 times within 30 days.",where:["Dune Analytics","SQL"],logic:`SELECT name, COUNT(*) as resolver_changes
FROM ens.events_NewResolver
WHERE evt_block_time >= NOW() - INTERVAL '30 days'
GROUP BY name
HAVING COUNT(*) >= 2`},
{cat:"Resolver changes",id:"RS5",prio:"P2",title:"Shared resolver across suspicious names",desc:"Flag resolver address used by many brand-similar or lure-keyword ENS names.",where:["Graph rule","Python","ENS subgraph"],logic:`# Group all ENS names by resolver address
# For each resolver, count names flagged by L1/L3/L4
SELECT resolver_addr, COUNT(*) AS risky_names
FROM ens_names
WHERE is_risky = TRUE
GROUP BY resolver_addr
HAVING COUNT(*) >= 3`},
{cat:"Resolver changes",id:"RS6",prio:"P3",title:"Resolver with CCIP/offchain lookup",desc:"Flag resolvers supporting EIP-3668 OffchainLookup; escalate only if endpoint is unknown or records are suspicious.",where:["Web3.py","ABI check"],logic:`# Check ABI for OffchainLookup error or resolve(bytes,bytes) function
# EIP-3668: resolver reverts with OffchainLookup(sender, urls, ...)
def supports_ccip(resolver_addr):
    abi = fetch_abi(resolver_addr)
    return any(e.get('name') == 'OffchainLookup' for e in abi)`},

{cat:"Mutable addr records",id:"A1",prio:"P1",title:"Recent payment address change",desc:"Flag addr record changes where funds arrive at the new address shortly after.",where:["Dune Analytics","SQL","ENS subgraph"],logic:`SELECT e.name, e.new_addr, t.value_eth, t.block_time
FROM ens_addr_changes e
JOIN eth_transfers t ON t.to_addr = e.new_addr
WHERE t.block_time > e.change_time

{cat:"Mutable addr records",id:"A2",prio:"P1",title:"Resolved address linked to known scam wallet",desc:"Cross-reference resolved ETH address against Chainabuse, Etherscan labels, phishing DBs, and internal scam clusters.",where:["Threat intel DB","Python","Chainabuse API","Etherscan labels"],logic:`def check(resolved_addr):

{cat:"Mutable addr records",id:"A3",prio:"P1",title:"Address poisoning style similarity",desc:"Flag resolved addresses sharing same prefix/suffix with victim's known trusted address but differing in the middle.",where:["Python","Transaction graph"],logic:`def is_poisoned(resolved, trusted):

{cat:"Mutable addr records",id:"A4",prio:"P1",title:"Multiple risky ENS names resolve to same wallet",desc:"Flag wallet if ≥ N suspicious ENS names all resolve to the same address.",where:["Graph rule","Python","ENS subgraph"],logic:`SELECT resolved_addr, COUNT(*) as risky_names

{cat:"Mutable addr records",id:"A5",prio:"P2",title:"High address churn",desc:"Flag if addr record changes ≥ N times in 7–30 days.",where:["Dune Analytics","SQL"],logic:`SELECT name, COUNT(*) as addr_changes

{cat:"Mutable addr records",id:"A6",prio:"P2",title:"Fresh wallet receives victim-like transfers",desc:"Flag resolved addresses that are newly created/low-history wallets receiving many small inbound transfers from unrelated EOAs.",where:["Transaction graph","Python","Dune SQL"],logic:`SELECT to_addr, COUNT(DISTINCT from_addr) AS unique_senders,
       MIN(block_time) AS first_seen
FROM eth_transfers
GROUP BY to_addr
HAVING COUNT(DISTINCT from_addr) >= 10
   AND DATEDIFF('day', MIN(block_time), NOW()) <= 30`},
{cat:"Mutable addr records",id:"A7",prio:"P3",title:"Forward/reverse resolution mismatch",desc:"Flag if forward resolution points to an address but reverse record points elsewhere or is absent.",where:["Python","ENS SDK","Web3.py"],logic:`from ens import ENS
ns = ENS.from_web3(w3)
def check(name):
    fwd = ns.address(name)

{cat:"Mutable text records",id:"T1",prio:"P1",title:"URL in text record — suspicious domain",desc:"Extract URLs from text records and enrich with domain age, reputation, redirect analysis, and brand similarity.",where:["Python","Regex","Threat intel APIs","VirusTotal / URLScan"],logic:`import re
URL_RE = re.compile(r'(?i)https?:\\/\\/[^\\s"\'<>]+')

            return True, "VT flagged"`},

)`},

{cat:"Mutable text records",id:"T6",prio:"P2",title:"Text-record churn",desc:"Flag if TextChanged event count ≥ N in 7–30 days for the same name.",where:["Dune Analytics","SQL"],logic:`SELECT name, COUNT(*) AS text_changes
FROM ens.events_TextChanged
WHERE evt_block_time >= NOW() - INTERVAL '30 days'

HAVING COUNT(*) >= 5`},
{cat:"Mutable text records",id:"T7",prio:"P2",title:"Suspicious key names in text records",desc:"Flag text record keys that look like API/C2/callback configuration.",where:["Regex","Python","ENS indexer"],logic:`import re
KEY_RE = re.compile(

{cat:"Mutable contenthash records",id:"C1",prio:"P1",title:"Recent contenthash change",desc:"Flag if contenthash changes on a name that already has brand/lure/trust signals.",where:["Dune Analytics","SQL","ENS subgraph"],logic:`SELECT name, new_contenthash, block_time

{cat:"Mutable contenthash records",id:"C4",prio:"P1",title:"Seed phrase collection form",desc:"YARA/regex over HTML to find input forms soliciting seed phrases or private keys.",where:["YARA","Regex","Python crawler"],logic:`import re

  r'(?i)(seed phrase|recovery phrase|private key|mnemonic).{0,80}(input|textarea|submit)',

{cat:"Mutable contenthash records",id:"C5",prio:"P2",title:"Rapid CID/contenthash rotation",desc:"Flag if contenthash changes ≥ N times in 7–30 days.",where:["Dune Analytics","SQL"],logic:`SELECT name, COUNT(*) AS cid_changes

{cat:"Mutable contenthash records",id:"C7",prio:"P2",title:"Brand impersonation in page content",desc:"Regex/YARA over fetched page title and body for brand names combined with claim/verify language.",where:["YARA","Regex","Python crawler"],logic:`import re

{cat:"Mutable contenthash records",id:"C8",prio:"P3",title:"Newly created CID on risky ENS",desc:"Flag if contenthash/CID appears first-seen recently and is attached to a high-risk ENS name.",where:["IPFS crawler","Python","CID first-seen DB"],logic:`def check(cid, name):

{cat:"Offchain resolution",id:"O7",prio:"P2",title:"Offchain endpoint linked to phishing infra",desc:"Cross-reference endpoint domain/IP/cert hash against phishing, malware, C2, or scam infrastructure lists.",where:["Threat intel","Python","URLScan","VirusTotal"],logic:`def check(endpoint_url):

const CATS = [...new Set(RULES.map(r=>r.cat))];
let activePrio = 'all';

function setPrio(p, btn) {
  activePrio = p;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const root = document.getElementById('root');
  let total = 0;

  let html = '';
  CATS.forEach(cat => {
    const rules = RULES.filter(r =>
      (activePrio === 'all' || r.prio === activePrio) &&
      (!q || r.title.toLowerCase().includes(q) || r.desc.toLowerCase().includes(q) || r.cat.toLowerCase().includes(q) || r.id.toLowerCase().includes(q))
      && r.cat === cat
    );
    if (!rules.length) return;
    total += rules.length;
    html += `<div class="section"><div class="section-title">${cat}</div>`;
    rules.forEach(r => {
      html += `<div class="rule-card" id="card-${r.id}">
        <div class="rule-header" onclick="toggle('${r.id}')" tabindex="0" onkeydown="if(event.key==='Enter')toggle('${r.id}')">
          <span class="priority-badge ${r.prio.toLowerCase()}">${r.prio}</span>
          <span class="rule-title">${r.id} — ${r.title}</span>
          <span class="rule-tag">${r.where[0]}</span>
          <i class="ti ti-chevron-down chevron" aria-hidden="true"></i>
        </div>
        <div class="rule-body">
          <div class="rule-section"><div class="rule-section-label">Description</div>
            <div class="desc">${r.desc}</div>
          </div>
          <div class="rule-section" style="margin-top:10px"><div class="rule-section-label">Where to set</div>
            <div style="margin-top:4px">${r.where.map(w=>`<span class="where-tag">${w}</span>`).join('')}</div>
          </div>
          <div class="rule-section" style="margin-top:10px"><div class="rule-section-label">Detection logic</div>
            <div class="code-block">${r.logic.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
          </div>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  if (!total) html = `<div class="no-results">No rules match your filter.</div>`;
  root.innerHTML = html;
  document.getElementById('stats').textContent = `${total} rule${total===1?'':'s'}`;
}

function toggle(id) {
  const card = document.getElementById('card-'+id);
  card.classList.toggle('open');
}

render();
</script>
